<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Category - Amimo Discovery</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="./icon-512.png">
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <style>
        /* Ensure category feed uses same width as main */
        #categoryFeed {
            padding: 0 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .category-header-sticky {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        #backToHomeBtn {
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        #backToHomeBtn:hover {
            transform: scale(1.05);
        }
        #categoryTitle {
            margin: 0;
            font-size: 1.4rem;
            color: var(--accent-blue);
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #statusMsg {
            text-align: center;
            padding: 2rem;
            font-size: 1rem;
            color: var(--text-muted);
        }
        /* Ensure bottom nav items are clickable */
        .bottom-nav .nav-item {
            cursor: pointer;
        }
        /* Make search wrapper consistent */
        .search-wrapper {
            background: var(--card-bg);
            border-radius: 60px;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            box-shadow: var(--shadow-md);
        }
        .search-wrapper input {
            flex: 1;
            border: none;
            padding: 0.85rem 0.2rem;
            font-size: 0.95rem;
            background: transparent;
            color: var(--text-primary);
            outline: none;
            font-weight: 500;
        }
        .search-wrapper button {
            background: var(--accent-blue);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- ========== HEADER (sticky) ========== -->
    <div class="main-header">
        <div class="logo-area">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <div class="logo"><i class="fas fa-cloud-moon"></i> Amimo Discovery</div>
        </div>
        <div class="location-badge" id="countryBadge"><i class="fas fa-map-marker-alt"></i> <span id="countryName">locating...</span></div>
    </div>

    <!-- ========== SEARCH ========== -->
    <div class="search-zone" id="searchZone">
        <div class="search-wrapper">
            <i class="fas fa-search" style="color: var(--accent-blue);"></i>
            <input type="text" id="searchInput" placeholder="Search news...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div id="loadingProgress" class="loading-progress"></div>

    <!-- ========== CATEGORY CONTENT ========== -->
    <div id="categoryView">
        <!-- Sticky category header -->
        <div class="category-header-sticky">
            <button id="backToHomeBtn"><i class="fas fa-arrow-left"></i></button>
            <h1 id="categoryTitle"><i class="fas fa-tag"></i> Category</h1>
        </div>
        <div id="statusMsg"><div class="loader"></div> Loading category news...</div>
        <div id="categoryFeed" class="news-feed"></div>
        <div id="loadSentinel" style="height:20px;"></div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer>
        <i class="fas fa-bookmark"></i> Offline saved · <span id="savedCounter">0</span> saved ·
        <button id="viewSavedBtn" style="background:none;border:none;color:var(--accent-glow);cursor:pointer;">📚 View saved</button><br>
        © Amimo Discovery, Inc. · Category page
    </footer>

    <!-- ========== BOTTOM NAV ========== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" data-nav="saved"><i class="fas fa-save"></i><span>Saved</span></button>
        <button class="nav-item" data-nav="tools"><i class="fas fa-tools"></i><span>Tools</span></button>
        <button class="nav-item" data-nav="live"><i class="fas fa-broadcast-tower"></i><span>Live</span></button>
    </div>

    <!-- ========== SIDE MENU ========== -->
    <div class="overlay" id="overlay"></div>
    <div class="side-menu" id="sideMenu">
        <div style="display:flex;justify-content:space-between;">
            <h3><i class="fas fa-bars"></i> Menu</h3>
            <button id="closeMenuBtn" style="background:none;border:none;font-size:1.8rem;cursor:pointer;">&times;</button>
        </div>
        <div class="menu-item" id="menuHome"><i class="fas fa-home"></i> Home</div>
        <div class="menu-item" id="menuSearch"><i class="fas fa-search"></i> Search Focus</div>
        <div class="menu-item" id="menuAbout"><i class="fas fa-info-circle"></i> About Amimo</div>
        <div class="theme-toggle">
            <span><i class="fas fa-moon"></i> Dark / Light</span>
            <label><input type="checkbox" id="themeSwitch"> <span style="margin-left:8px;">🌓</span></label>
        </div>
        <div class="menu-item" id="menuSaved"><i class="fas fa-database"></i> Saved Articles</div>
    </div>

    <script src="category.js?v=1.0.2"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js');
                    console.log('SW registered:', registration);
                } catch (e) { console.log('SW registration skipped:', e); }
            });
        }
    </script>
</body>
</html>
