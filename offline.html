<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

    <!-- ─── CACHE‑PREVENTING META TAGS ─── -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Amimo Discovery – Offline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ── reset ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── full‑screen gradient ── */
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f4f6fa, #eef2f5);
            min-height: 100vh;
            color: #1f2937;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem 1.5rem 2rem;
            background: transparent;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* ── offline icon ── */
        .offline-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        /* ── heading row ── */
        .heading-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .heading-row h2 {
            font-size: 1.8rem;
            color: #1e293b;
            margin: 0;
        }
        .status-badge {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 40px;
            padding: 0.25rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        .status-badge i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        .message {
            color: #475569;
            margin-bottom: 2rem;
        }

        /* ── buttons ── */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn {
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        .btn-secondary:hover {
            background: #475569;
            transform: scale(1.02);
        }

        /* ─── SAVED ARTICLES ─── */
        .saved-section {
            margin-top: 2rem;
            text-align: left;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 1.5rem;
        }
        .saved-title {
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #3b82f6;
            font-size: 1.1rem;
        }
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ── article card with image ── */
        .saved-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .saved-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .saved-card .card-image {
            flex: 0 0 110px;
            min-height: 110px;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .saved-card .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .saved-card .card-image .image-placeholder {
            font-size: 2.5rem;
            color: #94a3b8;
        }

        .saved-card .card-body {
            flex: 1;
            padding: 0.9rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .saved-card .card-body .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.25rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .saved-card .card-body .card-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.7rem;
            color: #64748b;
            margin: 0.25rem 0 0.35rem;
        }
        .saved-card .card-body .card-meta .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .saved-card .card-body .card-meta .meta-item i {
            font-size: 0.65rem;
            color: #94a3b8;
        }
        .saved-card .card-body .card-footer {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }
        .saved-card .card-body .card-footer .source {
            font-size: 0.7rem;
            color: #475569;
            background: rgba(59, 130, 246, 0.08);
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            white-space: nowrap;
        }
        .saved-card .card-body .card-footer .card-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .saved-card .card-body .card-footer .card-actions a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .saved-card .card-body .card-footer .card-actions .remove-saved {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.4rem;
            border-radius: 30px;
            transition: background 0.15s;
        }
        .saved-card .card-body .card-footer .card-actions .remove-saved:hover {
            background: rgba(220, 38, 38, 0.08);
        }

        .empty-saved {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #64748b;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            border: 1px dashed rgba(59, 130, 246, 0.2);
        }
        .empty-saved i {
            font-size: 2.5rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* ── footer ── */
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6c757d;
        }

        /* ── responsive ── */
        @media (max-width: 500px) {
            .offline-container {
                padding: 1.5rem 1rem;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
            .offline-icon {
                font-size: 3.8rem;
            }
            .heading-row h2 {
                font-size: 1.5rem;
            }

            .saved-card {
                flex-direction: column;
            }
            .saved-card .card-image {
                flex: 0 0 160px;
                min-height: 160px;
                width: 100%;
            }
            .saved-card .card-body .card-footer {
                flex-direction: column;
                align-items: stretch;
                gap: 0.4rem;
            }
            .saved-card .card-body .card-footer .source {
                align-self: flex-start;
            }
            .saved-card .card-body .card-footer .card-actions {
                justify-content: flex-start;
            }
        }

        @media (max-width: 380px) {
            .saved-card .card-image {
                flex: 0 0 130px;
                min-height: 130px;
            }
            .saved-card .card-body .card-title {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="offline-container" id="offlineContainer">

        <!-- ─── OFFLINE ICON ─── -->
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>

        <!-- ─── HEADING ─── -->
        <div class="heading-row">
            <h2>You're offline</h2>
            <span class="status-badge">
                <i class="fas fa-wifi"></i> Offline
            </span>
        </div>

        <p class="message">No internet connection. You can still access your saved articles.</p>

        <!-- ─── BUTTONS ─── -->
        <div class="button-group">
            <button class="btn btn-primary" id="viewSavedBtn"><i class="fas fa-bookmark"></i> View Saved Articles</button>
            <button class="btn btn-secondary" id="reloadBtn"><i class="fas fa-sync-alt"></i> Reload</button>
        </div>

        <!-- ─── SAVED ARTICLES ─── -->
        <div id="savedArticlesContainer" class="saved-section" style="display: none;">
            <div class="saved-title">
                <i class="fas fa-database"></i> Your Offline Library
                <span id="articleCount" style="font-size:0.75rem; font-weight:400; color:#94a3b8; margin-left:auto;">0 articles</span>
            </div>
            <div id="savedList" class="saved-list"></div>
        </div>

        <!-- ─── FOOTER ─── -->
        <footer>
            <i class="fas fa-cloud-moon"></i> Amimo Discovery · Offline mode
        </footer>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  GET SAVED ARTICLES from localStorage
        // ═══════════════════════════════════════════════════════════
        function getSavedArticles() {
            const saved = localStorage.getItem('amimo_saved');
            return saved ? JSON.parse(saved) : [];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ─── format date ──────────────────────────────────────────
        function formatDate(dateVal) {
            if (!dateVal) return 'Unknown date';
            try {
                const d = new Date(dateVal);
                if (isNaN(d.getTime())) return 'Unknown date';
                return d.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (_) {
                return 'Unknown date';
            }
        }

        // ─── format viewers ──────────────────────────────────────
        function formatViewers(count) {
            if (count === undefined || count === null) return '— views';
            const num = Number(count);
            if (isNaN(num)) return '— views';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M views';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K views';
            return num + ' views';
        }

        // ─── render saved articles ──────────────────────────────
        function renderSavedArticles() {
            const container = document.getElementById('savedArticlesContainer');
            const listDiv = document.getElementById('savedList');
            const countSpan = document.getElementById('articleCount');
            const articles = getSavedArticles();

            if (articles.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-saved">
                        <i class="fas fa-folder-open"></i>
                        No saved articles yet.<br/>
                        <span style="font-size:0.8rem; color:#94a3b8;">Go online and tap 💾 on any news to store it offline.</span>
                    </div>
                `;
                countSpan.textContent = '0 articles';
            } else {
                let html = '';
                articles.forEach(function(art, index) {
                    // image: use art.image or fallback to placeholder
                    const imgSrc = art.image || '';
                    const hasImage = imgSrc && imgSrc.length > 0;

                    // date & viewers
                    const dateStr = formatDate(art.date || art.publishedAt || art.timestamp);
                    const viewersStr = formatViewers(art.viewers || art.views || art.viewCount);

                    // determine placeholder icon
                    let placeholderIcon = 'fa-newspaper';
                    if (art.category) {
                        const cat = art.category.toLowerCase();
                        if (cat.includes('tech') || cat.includes('science')) placeholderIcon = 'fa-microchip';
                        else if (cat.includes('sport')) placeholderIcon = 'fa-futbol';
                        else if (cat.includes('business') || cat.includes('finance')) placeholderIcon = 'fa-chart-line';
                        else if (cat.includes('health')) placeholderIcon = 'fa-heartbeat';
                        else if (cat.includes('entertainment')) placeholderIcon = 'fa-film';
                        else if (cat.includes('travel')) placeholderIcon = 'fa-plane';
                    }

                    html += `
                        <div class="saved-card" data-index="${index}">
                            <div class="card-image">
                                ${hasImage
                                    ? `<img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(art.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />`
                                    : ''
                                }
                                <div class="image-placeholder" style="${hasImage ? 'display:none;' : 'display:flex;'}">
                                    <i class="fas ${placeholderIcon}"></i>
                                </div>
                            </div>
                            <div class="card-body">
                                <div>
                                    <div class="card-title">${escapeHtml(art.title)}</div>
                                    <div class="card-meta">
                                        <span class="meta-item"><i class="far fa-calendar-alt"></i> ${dateStr}</span>
                                        <span class="meta-item"><i class="far fa-eye"></i> ${viewersStr}</span>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <span class="source"><i class="fas fa-globe"></i> ${escapeHtml(art.source || 'Unknown source')}</span>
                                    <div class="card-actions">
                                        <a href="${art.link}" target="_blank">Read <i class="fas fa-external-link-alt"></i></a>
                                        <button class="remove-saved" data-link="${art.link}">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
                countSpan.textContent = articles.length + ' article' + (articles.length > 1 ? 's' : '');

                // attach remove events
                document.querySelectorAll('.remove-saved').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const link = btn.dataset.link;
                        let saved = getSavedArticles();
                        saved = saved.filter(function(s) { return s.link !== link; });
                        localStorage.setItem('amimo_saved', JSON.stringify(saved));
                        renderSavedArticles();
                    });
                });
            }
            container.style.display = 'block';
        }

        // ─── view saved button ──────────────────────────────────
        document.getElementById('viewSavedBtn').addEventListener('click', function() {
            renderSavedArticles();
        });

        // ─── reload button ──────────────────────────────────────
        document.getElementById('reloadBtn').addEventListener('click', function() {
            window.location.reload();
        });

        // ─── auto‑show if URL param ──────────────────────────────
        if (window.location.search.includes('show=saved')) {
            renderSavedArticles();
        }

        // ─── also show saved articles when page loads if there are any ──
        // (optional: uncomment to auto-display saved articles on load)
        // const saved = getSavedArticles();
        // if (saved.length > 0) renderSavedArticles();
    </script>
</body>
</html>
