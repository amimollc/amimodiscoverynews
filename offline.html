<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Amimo Discovery – Offline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f4f6fa, #eef2f5);
            min-height: 100vh;
            color: #1f2937;
            padding: 1rem;
        }
        .offline-container {
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(59,130,246,0.3);
        }
        .offline-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .message {
            color: #475569;
            margin-bottom: 2rem;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn {
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        .btn-secondary:hover {
            background: #475569;
            transform: scale(1.02);
        }
        .saved-section {
            margin-top: 2rem;
            text-align: left;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 1.5rem;
        }
        .saved-title {
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #3b82f6;
        }
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .saved-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .saved-card h4 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
        .saved-card p {
            font-size: 0.75rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
        }
        .saved-card a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .empty-saved {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6c757d;
        }
        @media (max-width: 500px) {
            .offline-container {
                padding: 1.5rem;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container" id="offlineContainer">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h2>You're offline</h2>
        <p class="message">No internet connection. You can still access your saved articles.</p>
        
        <div class="button-group">
            <button class="btn btn-primary" id="viewSavedBtn"><i class="fas fa-bookmark"></i> View Saved Articles</button>
            <button class="btn btn-secondary" id="reloadBtn"><i class="fas fa-sync-alt"></i> Reload</button>
        </div>
        
        <div id="savedArticlesContainer" class="saved-section" style="display: none;">
            <div class="saved-title">
                <i class="fas fa-database"></i> Your Offline Library
            </div>
            <div id="savedList" class="saved-list"></div>
        </div>
        <footer>
            <i class="fas fa-cloud-moon"></i> Amimo Discovery · Offline mode
        </footer>
    </div>

    <script>
        // Load saved articles from localStorage
        function getSavedArticles() {
            const saved = localStorage.getItem("amimo_saved");
            return saved ? JSON.parse(saved) : [];
        }

        // Render saved articles
        function renderSavedArticles() {
            const container = document.getElementById('savedArticlesContainer');
            const listDiv = document.getElementById('savedList');
            const articles = getSavedArticles();
            
            if (articles.length === 0) {
                listDiv.innerHTML = `<div class="empty-saved"><i class="fas fa-folder-open"></i> No saved articles yet.<br>Go online and tap 💾 on any news to store offline.</div>`;
            } else {
                let html = '';
                articles.forEach(art => {
                    html += `
                        <div class="saved-card">
                            <h4>${escapeHtml(art.title)}</h4>
                            <p>${escapeHtml(art.source || 'Unknown source')} • saved offline</p>
                            <a href="${art.link}" target="_blank">Read original <i class="fas fa-external-link-alt"></i></a>
                            <button class="remove-saved" data-link="${art.link}" style="background:none; border:none; color:#dc2626; font-size:0.7rem; margin-left:1rem; cursor:pointer;"><i class="fas fa-trash-alt"></i> Remove</button>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
                
                // Attach remove events
                document.querySelectorAll('.remove-saved').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const link = btn.dataset.link;
                        let saved = getSavedArticles();
                        saved = saved.filter(s => s.link !== link);
                        localStorage.setItem("amimo_saved", JSON.stringify(saved));
                        renderSavedArticles();  // re-render
                    });
                });
            }
            container.style.display = 'block';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Button handlers
        document.getElementById('viewSavedBtn').addEventListener('click', () => {
            renderSavedArticles();
        });
        
        document.getElementById('reloadBtn').addEventListener('click', () => {
            window.location.reload();
        });
        
        // Optional: if user comes directly offline, show a toast or auto-display saved if they click
    </script>
</body>
    </html>
