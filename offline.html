<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Amimo Discovery – Offline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ── reset & base (unchanged) ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f4f6fa, #eef2f5);
            min-height: 100vh;
            color: #1f2937;
            padding: 1rem;
        }
        .offline-container {
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            position: relative; /* needed for absolute back button */
        }

        /* ── BACK BUTTON: top‑left, inside container ── */
        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: background 0.2s, transform 0.15s;
            z-index: 5;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.98);
            transform: scale(1.02);
        }
        .back-btn i {
            font-size: 0.9rem;
            color: #3b82f6;
        }

        /* ── original offline icon (unchanged) ── */
        .offline-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        /* ── heading row: "You're offline" + status badge ── */
        .heading-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .heading-row h2 {
            font-size: 1.8rem;
            color: #1e293b;
            margin: 0; /* remove default margin */
        }
        .status-badge {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 40px;
            padding: 0.25rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        .status-badge i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        /* ── rest: completely untouched ── */
        .message {
            color: #475569;
            margin-bottom: 2rem;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn {
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        .btn-secondary:hover {
            background: #475569;
            transform: scale(1.02);
        }
        .saved-section {
            margin-top: 2rem;
            text-align: left;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 1.5rem;
        }
        .saved-title {
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #3b82f6;
        }
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .saved-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .saved-card .card-info {
            flex: 1;
            min-width: 140px;
        }
        .saved-card h4 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
        .saved-card p {
            font-size: 0.75rem;
            color: #4b5563;
            margin-bottom: 0.3rem;
        }
        .saved-card .card-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.25rem;
        }
        .saved-card a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .remove-saved {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
            transition: background 0.15s;
        }
        .remove-saved:hover {
            background: rgba(220, 38, 38, 0.08);
        }
        .empty-saved {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6c757d;
        }

        /* ── responsive ── */
        @media (max-width: 500px) {
            .offline-container {
                padding: 1.5rem 1rem;
            }
            .back-btn {
                top: 0.7rem;
                left: 0.7rem;
                padding: 0.3rem 0.8rem;
                font-size: 0.75rem;
            }
            .button-group {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
            .offline-icon {
                font-size: 3.8rem;
            }
            .heading-row h2 {
                font-size: 1.5rem;
            }
            .saved-card {
                flex-direction: column;
                align-items: stretch;
            }
            .saved-card .card-actions {
                justify-content: flex-start;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="offline-container" id="offlineContainer">

        <!-- ─── BACK BUTTON (top‑left) ─── -->
        <button class="back-btn" id="backBtn" aria-label="Go back">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <!-- ─── ORIGINAL OFFLINE ICON (completely untouched) ─── -->
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>

        <!-- ─── HEADING + NEW STATUS BADGE ─── -->
        <div class="heading-row">
            <h2>You're offline</h2>
            <span class="status-badge">
                <i class="fas fa-wifi"></i> Offline
            </span>
        </div>

        <!-- ─── ORIGINAL MESSAGE (unchanged) ─── -->
        <p class="message">No internet connection. You can still access your saved articles.</p>

        <!-- ─── ORIGINAL BUTTON GROUP (unchanged) ─── -->
        <div class="button-group">
            <button class="btn btn-primary" id="viewSavedBtn"><i class="fas fa-bookmark"></i> View Saved Articles</button>
            <button class="btn btn-secondary" id="reloadBtn"><i class="fas fa-sync-alt"></i> Reload</button>
        </div>

        <!-- ─── ORIGINAL SAVED SECTION (unchanged) ─── -->
        <div id="savedArticlesContainer" class="saved-section" style="display: none;">
            <div class="saved-title">
                <i class="fas fa-database"></i> Your Offline Library
            </div>
            <div id="savedList" class="saved-list"></div>
        </div>

        <!-- ─── ORIGINAL FOOTER (unchanged) ─── -->
        <footer>
            <i class="fas fa-cloud-moon"></i> Amimo Discovery · Offline mode
        </footer>
    </div>

    <script>
        // ─── all original JS, unchanged ──────────────────────
        function getSavedArticles() {
            const saved = localStorage.getItem('amimo_saved');
            return saved ? JSON.parse(saved) : [];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderSavedArticles() {
            const container = document.getElementById('savedArticlesContainer');
            const listDiv = document.getElementById('savedList');
            const articles = getSavedArticles();

            if (articles.length === 0) {
                listDiv.innerHTML =
                    `<div class="empty-saved"><i class="fas fa-folder-open"></i> No saved articles yet.<br>Go online and tap 💾 on any news to store offline.</div>`;
            } else {
                let html = '';
                articles.forEach(function(art) {
                    html += `
                        <div class="saved-card">
                            <div class="card-info">
                                <h4>${escapeHtml(art.title)}</h4>
                                <p>${escapeHtml(art.source || 'Unknown source')} • saved offline</p>
                            </div>
                            <div class="card-actions">
                                <a href="${art.link}" target="_blank">Read original <i class="fas fa-external-link-alt"></i></a>
                                <button class="remove-saved" data-link="${art.link}">
                                    <i class="fas fa-trash-alt"></i> Remove
                                </button>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;

                document.querySelectorAll('.remove-saved').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        const link = btn.dataset.link;
                        let saved = getSavedArticles();
                        saved = saved.filter(function(s) { return s.link !== link; });
                        localStorage.setItem('amimo_saved', JSON.stringify(saved));
                        renderSavedArticles();
                    });
                });
            }
            container.style.display = 'block';
        }

        // ─── back button handler ──────────────────────────────
        document.getElementById('backBtn').addEventListener('click', function() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        });

        document.getElementById('viewSavedBtn').addEventListener('click', function() {
            renderSavedArticles();
        });

        document.getElementById('reloadBtn').addEventListener('click', function() {
            window.location.reload();
        });

        // optional auto‑show
        if (window.location.search.includes('show=saved')) {
            renderSavedArticles();
        }
    </script>
</body>
</html>
