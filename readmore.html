<!-- readmore.html - News Card + Full Text Extraction (No images/videos, reload support) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ReadMore · Full Article Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1.5rem;
            color: #0f172a;
        }
        .container {
            max-width: 880px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }
        .header {
            background: #0f172a;
            padding: 1.2rem 1.8rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .header-actions {
            display: flex;
            gap: 0.8rem;
        }
        .btn-header {
            background: #334155;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            font-size: 0.85rem;
        }
        .btn-reload {
            background: #3b82f6;
        }
        .btn-reload:hover { background: #2563eb; }
        .btn-close {
            background: #dc2626;
        }
        .btn-close:hover { background: #b91c1c; }

        /* News Card (headline + description) */
        .news-card {
            background: #ffffff;
            border-radius: 24px;
            margin: 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .article-headline {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }
        .article-meta {
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .article-description {
            font-size: 1rem;
            line-height: 1.5;
            color: #334155;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 20px;
            margin: 1rem 0 0.5rem 0;
            font-style: normal;
            border-left: 4px solid #3b82f6;
        }
        .source-link {
            word-break: break-all;
        }

        /* Full extraction area */
        .extraction-section {
            margin: 0 1.8rem 1.8rem 1.8rem;
            border-top: 2px dashed #e2e8f0;
            padding-top: 1.5rem;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .status-badge {
            background: #e2e8f0;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .loader-box {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            margin: 1rem 0;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #cbd5e1;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .extracted-text {
            background: #fafcff;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #e2edff;
            font-size: 0.95rem;
            line-height: 1.65;
            white-space: pre-wrap;
            max-height: 550px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary:hover { background: #cbd5e1; }
        .error-box {
            background: #fef2f2;
            border-left: 5px solid #dc2626;
            padding: 1rem;
            border-radius: 16px;
            margin: 1rem 0;
            color: #991b1b;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .news-card { margin: 1rem; padding: 1rem; }
            .extraction-section { margin: 0 1rem 1rem 1rem; }
            .article-headline { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📰 ReadMore · Full Text Extractor</h1>
            <div class="header-actions">
                <button id="reloadBtn" class="btn-header btn-reload">⟳ Reload Extraction</button>
                <button id="closeBtn" class="btn-header btn-close">✕ Close</button>
            </div>
        </div>

        <!-- News Card: headline + description, loads immediately -->
        <div id="newsCardContainer" class="news-card">
            <div class="loader-box">
                <div class="spinner"></div>
                <div>⏳ Loading article metadata ...</div>
            </div>
        </div>

        <!-- Full extraction area (text only) -->
        <div class="extraction-section">
            <div class="section-title">
                📄 Full Article Text
                <span id="extractStatusBadge" class="status-badge">⏳ waiting</span>
            </div>
            <div id="extractionContent">
                <div class="loader-box">
                    <div class="spinner"></div>
                    <div>Loading ... Please wait(up to 2 minutes)</div>
                    <small>Fetching the complete article text – 
                    
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let articleUrl = urlParams.get('url');
        let articleTitle = urlParams.get('title') || null;

        if (!articleUrl) {
            document.getElementById('newsCardContainer').innerHTML = `
                <div class="error-box">
                    <strong>⚠️ No article URL provided.</strong><br>
                    Please return to the main page and click "Read More".
                </div>
                <div class="action-bar">
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">🏠 Go to Home</button>
                </div>
            `;
            document.getElementById('extractionContent').innerHTML = '';
            return;
        }

        // DOM elements
        const newsCardDiv = document.getElementById('newsCardContainer');
        const extractionDiv = document.getElementById('extractionContent');
        const statusBadge = document.getElementById('extractStatusBadge');
        const reloadBtn = document.getElementById('reloadBtn');
        const closeBtn = document.getElementById('closeBtn');

        let currentAbortController = null;
        let extractedFullText = "";

        // Helper: escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }

        // Copy to clipboard
        async function copyToClipboard(text) {
            try { await navigator.clipboard.writeText(text); }
            catch { 
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        // Show news card with headline and description (extracted from meta or fallback)
        async function loadNewsCard(url, providedTitle) {
            newsCardDiv.innerHTML = `<div class="loader-box"><div class="spinner"></div><div>📡 Fetching article info ...</div></div>`;
            let headline = providedTitle || "Loading title...";
            let description = "Fetching description from the article...";
            let sourceUrl = url;

            try {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const resp = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
                if (resp.ok) {
                    const html = await resp.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    // Try to get title if not provided
                    if (!providedTitle) {
                        const titleTag = doc.querySelector('title');
                        if (titleTag) headline = titleTag.innerText.trim();
                        const ogTitle = doc.querySelector('meta[property="og:title"]');
                        if (ogTitle && ogTitle.getAttribute('content')) headline = ogTitle.getAttribute('content');
                    }
                    // Get description
                    const metaDesc = doc.querySelector('meta[name="description"]');
                    if (metaDesc && metaDesc.getAttribute('content')) description = metaDesc.getAttribute('content');
                    const ogDesc = doc.querySelector('meta[property="og:description"]');
                    if (ogDesc && ogDesc.getAttribute('content')) description = ogDesc.getAttribute('content');
                    if (description.length > 300) description = description.substring(0, 300) + "...";
                }
            } catch (err) {
                console.warn("Could not fetch meta info, using fallback");
                if (!providedTitle) headline = "Article (title unavailable)";
                description = "Description could not be loaded automatically. Full text will appear below after extraction.";
            }

            if (!headline || headline === "") headline = "News Article";
            document.title = `ReadMore: ${headline.substring(0, 60)}`;

            newsCardDiv.innerHTML = `
                <div class="article-headline">${escapeHtml(headline)}</div>
                <div class="article-meta">
                    <span>🔗 <a href="${escapeHtml(sourceUrl)}" target="_blank" class="source-link">${escapeHtml(sourceUrl.length > 70 ? sourceUrl.substring(0,70)+'…' : sourceUrl)}</a></span>
                </div>
                <div class="article-description">
                    <strong>📌 Description</strong><br>${escapeHtml(description)}
                </div>
                <div style="font-size:0.75rem; color:#64748b; margin-top:0.8rem;">⬇ Full article text is being extracted below (may take up to 2 min).</div>
            `;
        }

        // Full text extraction (no images/videos)
        async function startFullTextExtraction(url) {
            if (currentAbortController) {
                currentAbortController.abort();
            }
            const abortCtrl = new AbortController();
            currentAbortController = abortCtrl;
            const signal = abortCtrl.signal;

            extractionDiv.innerHTML = `
                <div class="loader-box">
                    <div class="spinner"></div>
                    <div><strong>🕒 Extracting full article text ... (up to 120 seconds)</strong></div>
                    <small>Fetching the page, removing clutter, and extracting readable paragraphs.</small>
                </div>
            `;
            statusBadge.innerText = '⏳ extracting';
            statusBadge.style.background = "#fef9c3";
            statusBadge.style.color = "#854d0e";

            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            let timeoutId = null;

            try {
                const fetchPromise = fetch(proxy, { signal });
                timeoutId = setTimeout(() => abortCtrl.abort(), 120000);
                const resp = await fetchPromise;
                clearTimeout(timeoutId);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const html = await resp.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');

                // Smart text extraction (paragraphs only, no media)
                let paragraphs = [];
                const selectors = [
                    'article p', 'main p', '.article-body p', '.story-body p',
                    '.post-content p', '.entry-content p', '.content__article p',
                    '.article__content p', '.single-content p'
                ];
                let found = false;
                for (let sel of selectors) {
                    const items = doc.querySelectorAll(sel);
                    if (items.length > 2) {
                        items.forEach(p => {
                            let txt = p.innerText.trim();
                            if (txt.length > 60) paragraphs.push(txt);
                        });
                        if (paragraphs.length >= 5) { found = true; break; }
                    }
                }
                if (!found || paragraphs.length < 3) {
                    const allParas = doc.querySelectorAll('p');
                    allParas.forEach(p => {
                        let txt = p.innerText.trim();
                        if (txt.length > 90 && !txt.toLowerCase().includes('cookie') && !txt.toLowerCase().includes('subscribe') && !txt.includes('advertisement')) {
                            paragraphs.push(txt);
                        }
                    });
                }

                let fullText = paragraphs.join('\n\n');
                if (!fullText || fullText.length < 150) {
                    fullText = doc.body.innerText || '';
                    fullText = fullText.replace(/\s+/g, ' ').substring(0, 8000);
                }
                if (fullText.length > 15000) fullText = fullText.substring(0, 15000) + "\n\n... (truncated for readability)";

                extractedFullText = fullText;
                const wordCount = fullText.split(/\s+/).filter(w => w.length > 0).length;

                // Display extracted text
                extractionDiv.innerHTML = `
                    <div class="extracted-text">${escapeHtml(fullText).replace(/\n/g, '<br>')}</div>
                    <div class="action-bar">
                        <button id="copyTextBtn" class="btn btn-primary">📋 Copy Full Text</button>
                        <button id="downloadTextBtn" class="btn btn-secondary">💾 Download .txt</button>
                        <button id="openOriginalBtn" class="btn btn-secondary">🔗 Open Original Article</button>
                    </div>
                `;
                statusBadge.innerText = `✅ extracted (${wordCount} words)`;
                statusBadge.style.background = "#dcfce7";
                statusBadge.style.color = "#166534";

                document.getElementById('copyTextBtn')?.addEventListener('click', () => {
                    copyToClipboard(extractedFullText).then(() => alert('✅ Full article text copied!'));
                });
                document.getElementById('downloadTextBtn')?.addEventListener('click', () => {
                    const headlineText = document.querySelector('.article-headline')?.innerText || 'Article';
                    const blob = new Blob([`TITLE: ${headlineText}\nSOURCE: ${url}\n\n--- FULL TEXT ---\n\n${extractedFullText}`], {type: 'text/plain'});
                    const a = document.createElement('a');
                    const urlBlob = URL.createObjectURL(blob);
                    a.href = urlBlob;
                    a.download = `article_${headlineText.substring(0, 50).replace(/[^\w]/g,'_')}.txt`;
                    a.click();
                    URL.revokeObjectURL(urlBlob);
                });
                document.getElementById('openOriginalBtn')?.addEventListener('click', () => window.open(url, '_blank'));

            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    extractionDiv.innerHTML = `<div class="error-box">⏱️ Extraction timed out after 120 seconds. The website may be slow or blocking requests. Try using "Reload Extraction".</div>`;
                } else {
                    extractionDiv.innerHTML = `<div class="error-box">❌ Extraction failed: ${escapeHtml(err.message || 'Network error')}<br><button id="retryBtn" class="btn btn-primary" style="margin-top:0.8rem;">⟳ Retry Extraction</button></div>`;
                    document.getElementById('retryBtn')?.addEventListener('click', () => startFullTextExtraction(url));
                }
                statusBadge.innerText = '⚠️ failed';
                statusBadge.style.background = "#fee2e2";
                statusBadge.style.color = "#991b1b";
            } finally {
                if (currentAbortController === abortCtrl) currentAbortController = null;
            }
        }

        // reload function
        function performReload() {
            if (currentAbortController) currentAbortController.abort();
            // Reload news card (metadata)
            loadNewsCard(articleUrl, articleTitle);
            // Restart extraction
            startFullTextExtraction(articleUrl);
        }

        // Initialize
        loadNewsCard(articleUrl, articleTitle);
        startFullTextExtraction(articleUrl);

        // Event listeners
        reloadBtn?.addEventListener('click', performReload);
        closeBtn?.addEventListener('click', () => window.close());
    })();
</script>
</body>
</html>
