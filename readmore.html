<!-- readmore.html - Independent Full-Text Extractor (opened from main page) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ReadMore · Full Article</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 1.5rem;
            color: #0f172a;
        }
        .container {
            max-width: 880px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }
        .header {
            background: #0f172a;
            padding: 1.2rem 1.8rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .back-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-btn:hover { background: #2563eb; }
        .content-area {
            padding: 2rem;
        }
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            gap: 1.2rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #cbd5e1;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .article-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #0f172a;
            line-height: 1.3;
        }
        .article-meta {
            color: #475569;
            font-size: 0.8rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .extracted-text {
            font-size: 1rem;
            line-height: 1.65;
            color: #1e293b;
            white-space: pre-wrap;
        }
        .extracted-text p {
            margin-bottom: 1rem;
        }
        .error-box {
            background: #fef2f2;
            border-left: 6px solid #dc2626;
            padding: 1.2rem;
            border-radius: 20px;
            margin: 1rem 0;
        }
        .action-bar {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary:hover { background: #cbd5e1; }
        .fallback-iframe {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            margin-top: 1rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .article-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📖 ReadMore · Article</h1>
            <button class="back-btn" onclick="window.close()">✕ Close</button>
        </div>
        <div class="content-area" id="readmoreContent">
            <div class="loader-container">
                <div class="spinner"></div>
                <div>🔍 Loading full article content ...</div>
                <small style="color:#64748b;">Using robust loading engine</small>
            </div>
        </div>
    </div>
</div>
<script>
    (function() {
        const contentDiv = document.getElementById('readmoreContent');
        const urlParams = new URLSearchParams(window.location.search);
        let articleUrl = urlParams.get('url');
        let articleTitle = urlParams.get('title') || 'Article';

        if (!articleUrl) {
            contentDiv.innerHTML = `
                <div class="error-box">
                    <strong>⚠️ No article URL provided.</strong><br>
                    Please return to the main page and click "Read More" again.
                </div>
                <div class="action-bar">
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">🏠 Go to Home</button>
                </div>
            `;
            return;
        }

        // Show initial title
        document.title = `ReadMore: ${articleTitle.substring(0, 60)}`;

        async function extractFullText(url) {
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 16000);
            try {
                const resp = await fetch(proxy, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const html = await resp.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                // Smart extraction: prioritize article/main sections
                let contentParagraphs = [];
                const selectors = ['article p', 'main p', '.article-body p', '.story-body p', '.post-content p', '.entry-content p', '.content__article p'];
                for (let sel of selectors) {
                    const paras = doc.querySelectorAll(sel);
                    if (paras.length > 3) {
                        paras.forEach(p => {
                            let txt = p.innerText.trim();
                            if (txt.length > 50) contentParagraphs.push(txt);
                        });
                        break;
                    }
                }
                if (contentParagraphs.length < 4) {
                    // fallback: all paragraphs with length > 80
                    const allParas = doc.querySelectorAll('p');
                    allParas.forEach(p => {
                        let txt = p.innerText.trim();
                        if (txt.length > 80 && !txt.includes('cookie') && !txt.includes('advertisement')) {
                            contentParagraphs.push(txt);
                        }
                    });
                }
                let finalText = contentParagraphs.join('\n\n');
                if (!finalText || finalText.length < 150) {
                    // extreme fallback: body text
                    finalText = doc.body.innerText || '';
                    finalText = finalText.replace(/\s+/g, ' ').substring(0, 5000);
                }
                if (finalText.length > 12000) finalText = finalText.substring(0, 12000) + '\n\n... (truncated for readability)';
                return { success: true, content: finalText };
            } catch (err) {
                clearTimeout(timeoutId);
                return { success: false, error: err.message };
            }
        }

        async function loadAndRender() {
            contentDiv.innerHTML = `<div class="loader-container"><div class="spinner"></div><div>📡 Fetching and parsing article ...</div><small>${escapeHtml(articleUrl)}</small></div>`;
            const result = await extractFullText(articleUrl);
            if (result.success && result.content.length > 100) {
                const formattedContent = result.content.replace(/\n/g, '<br>');
                contentDiv.innerHTML = `
                    <div class="article-title">${escapeHtml(articleTitle)}</div>
                    <div class="article-meta">
                        <span>🔗 <a href="${escapeHtml(articleUrl)}" target="_blank" style="color:#3b82f6;">${escapeHtml(articleUrl.substring(0, 80))}</a></span>
                        <span>📄 ${Math.ceil(result.content.split(/\s+/).length)} words</span>
                    </div>
                    <div class="extracted-text">${formattedContent}</div>
                    <div class="action-bar">
                        <button id="copyBtn" class="btn btn-primary">📋 Copy Full Text</button>
                        <button id="downloadBtn" class="btn btn-secondary">💾 Download .txt</button>
                        <button id="openOriginalBtn" class="btn btn-secondary">🔗 Open Original</button>
                    </div>
                `;
                document.getElementById('copyBtn')?.addEventListener('click', () => {
                    copyToClipboard(result.content).then(() => alert('✅ Article copied to clipboard!'));
                });
                document.getElementById('downloadBtn')?.addEventListener('click', () => {
                    const blob = new Blob([`TITLE: ${articleTitle}\nSOURCE: ${articleUrl}\n\n--- FULL TEXT ---\n\n${result.content}`], {type: 'text/plain'});
                    const a = document.createElement('a');
                    const urlBlob = URL.createObjectURL(blob);
                    a.href = urlBlob;
                    a.download = `article_${articleTitle.substring(0, 50).replace(/[^\w]/g,'_')}.txt`;
                    a.click();
                    URL.revokeObjectURL(urlBlob);
                });
                document.getElementById('openOriginalBtn')?.addEventListener('click', () => window.open(articleUrl, '_blank'));
            } else {
                // extraction failed – show fallback options
                contentDiv.innerHTML = `
                    <div class="error-box">
                        <strong>⚠️ Extraction failed</strong><br>
                        ${escapeHtml(result.error || 'Could not retrieve full text. The website may block automated requests.')}
                    </div>
                    <div class="action-bar">
                        <button id="fallbackOpen" class="btn btn-primary">🔗 Open Original Article</button>
                        <button id="fallbackEmbed" class="btn btn-secondary">🖥️ Embed Page Preview</button>
                        <button id="fallbackClose" class="btn btn-secondary">❌ Close</button>
                    </div>
                    <div id="embedContainer" style="margin-top:1rem;"></div>
                `;
                document.getElementById('fallbackOpen')?.addEventListener('click', () => window.open(articleUrl, '_blank'));
                document.getElementById('fallbackEmbed')?.addEventListener('click', () => {
                    const container = document.getElementById('embedContainer');
                    if (container) {
                        container.innerHTML = `<iframe class="fallback-iframe" src="${escapeHtml(articleUrl)}" title="Embedded content"></iframe>`;
                    }
                });
                document.getElementById('fallbackClose')?.addEventListener('click', () => window.close());
            }
        }

        async function copyToClipboard(text) {
            try { await navigator.clipboard.writeText(text); } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }

        loadAndRender();
    })();
</script>
</body>
</html>
